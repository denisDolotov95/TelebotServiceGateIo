info:
  title: Gate.io REST API
  description: >-
    Взаимодействие с gate.io <a
    href='https://www.gate.io/docs/developers/apiv4/'>API</a>
  contact:
    name: Denis D.
    email: gambit0095.mail@gmail.com
  version: 0.0.1
paths:
  /spot/currency_pair:
    post:
      tags:
        - Spot
      summary: Currency Pair
      operationId: currency_pair_spot_currency_pair_post
      parameters:
        - name: currency_pair
          in: query
          required: true
          schema:
            type: string
            title: Currency Pair
          example: BTC_USDT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payload'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/CurrencyPair'
                  - type: 'null'
                title: Response Currency Pair Spot Currency Pair Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
