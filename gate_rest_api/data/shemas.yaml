components:
  schemas:
    Account:
      properties:
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        available:
          anyOf:
            - type: string
            - type: 'null'
          title: Available
        locked:
          anyOf:
            - type: string
            - type: 'null'
          title: Locked
        update_id:
          anyOf:
            - type: integer
            - type: 'null'
          title: Update Id
      type: object
      title: Account
    AccountBook:
      properties:
        id:
          anyOf:
            - type: string
            - type: 'null'
          title: Id
        time:
          type: integer
          title: Time
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        change:
          anyOf:
            - type: string
            - type: 'null'
          title: Change
        balance:
          anyOf:
            - type: string
            - type: 'null'
          title: Balance
        type:
          anyOf:
            - type: string
            - type: 'null'
          title: Type
        text:
          anyOf:
            - type: string
            - type: 'null'
          title: Text
      type: object
      title: AccountBook
    Ask:
      properties:
        price:
          anyOf:
            - type: string
            - type: 'null'
          title: Price
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
      type: object
      title: Ask
    Bid:
      properties:
        price:
          anyOf:
            - type: string
            - type: 'null'
          title: Price
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
      type: object
      title: Bid
    Candlestick:
      properties:
        unix_timestamp:
          anyOf:
            - type: string
            - type: 'null'
          title: Unix Timestamp
        trade_volume_in_quote:
          type: number
          title: Trade Volume In Quote
        close_price:
          anyOf:
            - type: string
            - type: 'null'
          title: Close Price
        highest_price:
          anyOf:
            - type: string
            - type: 'null'
          title: Highest Price
        lowest_price:
          anyOf:
            - type: string
            - type: 'null'
          title: Lowest Price
        open_price:
          anyOf:
            - type: string
            - type: 'null'
          title: Open Price
        trade_volume_in_base:
          type: number
          title: Trade Volume In Base
        window_is_closed:
          type: boolean
          title: Window Is Closed
      type: object
      title: Candlestick
      description: >-
        K-line data for each time granularity, arranged from left to right:

        - Unix timestamp with second precision

        - Trading volume in quote currency

        - Closing price

        - Highest price

        - Lowest price

        - Opening price

        - Trading volume in base currency

        - Whether the window is closed; true indicates the end of this segment
        of candlestick chart data, false indicates that this segment of
        candlestick chart data is not yet complete
                Args:
                    BaseModel (_type_): _description_
    Cbbc:
      properties:
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
      type: object
      title: Cbbc
    Connect:
      properties:
        read_timeout:
          anyOf:
            - type: integer
            - type: 'null'
          title: Read Timeout
          default: 30
        timeout:
          anyOf:
            - type: integer
            - type: 'null'
          title: Timeout
          default: 5
      type: object
      title: Connect
    CrossMargin:
      properties:
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
      type: object
      title: CrossMargin
    CurrencyPair:
      properties:
        id:
          anyOf:
            - type: string
            - type: 'null'
          title: Id
        base:
          anyOf:
            - type: string
            - type: 'null'
          title: Base
        quote:
          anyOf:
            - type: string
            - type: 'null'
          title: Quote
        fee:
          anyOf:
            - type: string
            - type: 'null'
          title: Fee
        min_base_amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Min Base Amount
        min_quote_amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Min Quote Amount
        max_base_amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Max Base Amount
        max_quote_amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Max Quote Amount
        amount_precision:
          type: integer
          title: Amount Precision
        precision:
          type: integer
          title: Precision
        trade_status:
          anyOf:
            - type: string
            - type: 'null'
          title: Trade Status
        sell_start:
          type: integer
          title: Sell Start
        buy_start:
          type: integer
          title: Buy Start
      type: object
      title: CurrencyPair
    Data:
      properties:
        limit:
          anyOf:
            - type: integer
            - type: 'null'
          title: Limit
          default: 1
        interval:
          enum:
            - 10s
            - 1m
            - 5m
            - 15m
            - 30m
            - 1h
            - 4h
            - 8h
            - 1d
            - 7d
            - 30d
            - null
          title: Interval
      type: object
      title: Data
    Delivery:
      properties:
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
        unrealised_pnl:
          anyOf:
            - type: string
            - type: 'null'
          title: Unrealised Pnl
      type: object
      title: Delivery
    Details:
      properties:
        cross_margin:
          $ref: '#/components/schemas/CrossMargin'
        spot:
          $ref: '#/components/schemas/Spot'
        finance:
          $ref: '#/components/schemas/Finance'
        margin:
          $ref: '#/components/schemas/Margin'
        quant:
          $ref: '#/components/schemas/Quant'
        futures:
          $ref: '#/components/schemas/Futures'
        delivery:
          $ref: '#/components/schemas/Delivery'
        warrant:
          $ref: '#/components/schemas/Warrant'
        cbbc:
          $ref: '#/components/schemas/Cbbc'
      type: object
      title: Details
    Finance:
      properties:
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
      type: object
      title: Finance
    Futures:
      properties:
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
        unrealised_pnl:
          anyOf:
            - type: string
            - type: 'null'
          title: Unrealised Pnl
      type: object
      title: Futures
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    Margin:
      properties:
        currency:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
        borrowed:
          anyOf:
            - type: string
            - type: 'null'
          title: Borrowed
      type: object
      title: Margin
    OpenOrders:
      properties:
        currency_pair:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency Pair
        total:
          anyOf:
            - type: string
            - type: integer
            - type: 'null'
          title: Total
        orders:
          items:
            $ref: '#/components/schemas/ShortOrder'
          type: array
          title: Orders
      type: object
      title: OpenOrders
    Order:
      properties:
        id:
          anyOf:
            - type: string
            - type: 'null'
          title: Id
        text:
          anyOf:
            - type: string
            - type: 'null'
          title: Text
        create_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Create Time
        update_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Update Time
        currency_pair:
          anyOf:
            - type: string
            - type: 'null'
          title: Currency Pair
        status:
          anyOf:
            - type: string
            - type: 'null'
          title: Status
        type:
          anyOf:
            - type: string
            - type: 'null'
          title: Type
        account:
          anyOf:
            - type: string
            - type: 'null'
          title: Account
        side:
          anyOf:
            - type: string
            - type: 'null'
          title: Side
        amount:
          anyOf:
            - type: string
            - type: 'null'
          title: Amount
        price:
          anyOf:
            - type: string
